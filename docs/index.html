<html>
    <body>
    <title>htmlpractice</title>
    <h1>Lists</h1>
    <p>
        HTML supports two kinds of lists:
        ordered (numbered) lists and unordered (bulleted) lists.
    </p>
    <h2>Unordered List Example</h2>
    <ul>
        <li>First item</li>
        <li>Second item
            <ul>
                <li>Nested item</li>
                <li>Another nested item</li>
            </ul>
        </li>
        <li>Third item</li>
    </ul>
    <h2>Ordered List Example</h2>
    <ol>
        <li>Step one</li>
        <li>Step two</li>
        <li>Step three</li>
    </ol>
    <body>
</html>
